git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
  commitPrefix:
    - pattern: "^\\w+\\/(\\w+-\\d+).*"
      replace: '$1: '
    - pattern: "^(\\w+-\\d+).*"
      replace: '$1: '
  push:
    forcePushWithLease: true
gui:
  filterMode: fuzzy
  commandLogSize: 18
  scrollHeight: 10
  commitAuthorLongLength: 2
  nerdFontsVersion: '3'
  showFileIcons: true
  showPanelJumps: false
  showCommandLog: true
notARepository: 'skip'
